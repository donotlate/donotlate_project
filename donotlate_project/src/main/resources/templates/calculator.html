<!DOCTYPE html>
<html lang="ko">
<th:block th:replace="~{head :: headFragment}"></th:block>
<body class="page-background">
<th:block th:replace="~{header :: headerFragment}"></th:block>
<!-- 사이드바 오버레이 (모바일용) -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<div class="layout-container">
    <th:block th:replace="~{aside :: asideFragment}"></th:block>
    <main class="main-content">
        <div class="main-content-wrapper content-max-width-xl">
            <div class="alarm-grid-layout grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- 1번째 줄 -->
                <section id="location-input-section" class="section-card">
                    <h2 class="heading-3 flex-center">
                        <i class="fa-solid fa-location-dot text-blue-600 mr-2"></i>
                        출발지 및 도착지<span class="text-red-500 ml-0.5">*</span>
                    </h2>
                    
                    <div class="space-y-3">
                        <div class="relative">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center">
                                <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                            </div>
                            <input type="hidden" id="departure-lat">
                            <input type="hidden" id="departure-lng">
                            <input type="text" readonly id="departure-input" placeholder="출발지를 입력해주세요."
                                class="w-full pl-12 pr-12 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-medium cursor-pointer">
                            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" onclick="sample4_execDaumPostcode()">
                                <i class="fa-solid fa-location-crosshairs"></i>
                            </button>
                        </div>
                        
                        <div class="flex justify-center -my-2 z-10 relative">
                            <button onclick="swapLocations()" class="w-8 h-8 flex items-center justify-center bg-white border border-gray-200 rounded-full hover:bg-gray-50 transition shadow-sm">
                                <i class="fa-solid fa-up-down text-gray-600 text-sm"></i>
                            </button>
                        </div>
                        
                        <div class="relative">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center">
                                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                            </div>
                            <input type="hidden" id="arrival-lat">
                            <input type="hidden" id="arrival-lng">
                            <input type="text" readonly id="arrival-input" placeholder="도착지를 입력해주세요."
                                class="w-full pl-12 pr-12 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-medium cursor-pointer">
                            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" onclick="sample5_execDaumPostcode()">
                                <i class="fa-solid fa-location-crosshairs"></i>
                            </button>
                        </div>
                    </div>
                </section>

                <section id="time-settings-section" class="section-card">
                    <h2 class="heading-3 flex-center">
                        <i class="fa-solid fa-clock text-blue-600 mr-2"></i>
                        일정 상세 설정<span class="text-red-500 ml-0.5">*</span>
                    </h2>
                    
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-gray-700 block">도착 희망 일시</label>
                            <div class="flex items-center space-x-2">
                                <div class="relative flex-1">
                                    <i class="fa-solid fa-calendar-days absolute left-3 top-1/2 -translate-y-1/2 text-blue-500 text-sm"></i>
                                    <input type="date" id="departure-date" class="w-full pl-9 pr-2 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-semibold text-sm">
                                </div>
                                <div class="relative">
                                    <input type="time" id="departure-time" class="w-32 px-2 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-semibold text-sm text-center">
                                </div>
                            </div>
                        </div>
                
                        <hr class="border-gray-100">
                
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-medium text-gray-700">개인 준비 시간</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" id="prepare-time" value="10" min="0" max="60" 
                                    oninput="this.value = Number(this.value); if(this.value > 60) this.value = 60;"
                                    class="w-16 px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-center font-semibold text-sm">
                                <span class="text-xs text-gray-500">분</span>
                            </div>
                        </div>
                
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-medium text-gray-700">교통 여유 시간</label>
                            <div class="flex items-center space-x-2">
                                <input type="number" id="transport-time" value="10" min="0" max="60" 
                                    oninput="this.value = Number(this.value); if(this.value > 60) this.value = 60;"
                                    class="w-16 px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-center font-semibold text-sm">
                                <span class="text-xs text-gray-500">분</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 2번째 줄 -->
                <section id="transport-selection-section" class="section-card lg:col-span-2">
                    <h2 class="heading-3 flex-center">
                        <i class="fa-solid fa-train-subway text-blue-600 mr-2"></i>
                        교통수단 선택
                    </h2>
                    
                    <div class="grid grid-cols-3 gap-3">
                        <button data-mode="SUBWAY" class="transport-btn flex flex-col items-center justify-center p-4 bg-gray-50 border-2 border-gray-200 rounded-xl hover:bg-gray-100 transition">
                            <i class="fa-solid fa-train-subway text-gray-600 text-2xl mb-2"></i>
                            <span class="text-sm font-semibold text-gray-600">지하철</span>
                        </button>
                        
                        <button data-mode="BUS" class="transport-btn flex flex-col items-center justify-center p-4 bg-gray-50 border-2 border-gray-200 rounded-xl hover:bg-gray-100 transition">
                            <i class="fa-solid fa-bus text-gray-600 text-2xl mb-2"></i>
                            <span class="text-sm font-semibold text-gray-600">버스</span>
                        </button>
                        
                        <button data-mode="MIX" class="transport-btn flex flex-col items-center justify-center p-4 bg-gray-50 border-2 border-gray-200 rounded-xl hover:bg-gray-100 transition">
                            <i class="fa-solid fa-shuffle text-gray-600 text-2xl mb-2"></i>
                            <span class="text-sm font-semibold text-gray-600">혼합</span>
                        </button>
                    </div>
                </section>

                <!-- 3번째 줄 -->
                <section id="route-result-container" class="lg:col-span-3 space-y-6">
                </section>

                <!-- 4번째 줄 -->
                <section id="recommended-push-time-section" class="bg-gradient-to-br from-indigo-600 to-green-700 rounded-2xl shadow-lg p-6 text-white">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold flex items-center">
                            <i class="fa-solid fa-bell mr-2"></i>
                            권장 기상 시간
                        </h2>                
                        <div class="flex items-center space-x-2 bg-white/20 px-3 py-1 rounded-full">
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                            <span id="selected-route-label-recommend"
                                  class="text-xs font-medium">
                                경로 선택 필요
                            </span>
                        </div>
                    </div>         
                    <div class="text-center py-6">
                        <div id="recommend-push-time"
                             class="text-6xl font-bold mb-2">
                            --:--
                        </div>
                        <div id="recommend-period" class="text-blue-200 text-sm">--</div>
                    </div>     
                    <div class="grid grid-cols-3 gap-3 mt-6">                
                        <div class="bg-white/10 rounded-xl p-3 text-center backdrop-blur">
                            <div id="recommend-prepare-time" class="text-2xl font-bold">--</div>
                            <div class="text-xs text-blue-200 mt-1">준비시간</div>
                        </div>                 
                        <div class="bg-white/10 rounded-xl p-3 text-center backdrop-blur">
                            <div id="recommend-move-time" class="text-2xl font-bold">--</div>
                            <div class="text-xs text-blue-200 mt-1">이동시간</div>
                        </div>                  
                        <div class="bg-white/10 rounded-xl p-3 text-center backdrop-blur">
                            <div id="recommend-buffer-time" class="text-2xl font-bold">--</div>
                            <div class="text-xs text-blue-200 mt-1">여유시간</div>
                        </div>        
                    </div>
                </section>

                <section id="ai-recommended-push-time-section" class="bg-gradient-to-br from-purple-600 to-indigo-700 rounded-2xl shadow-lg p-6 text-white">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold flex items-center">
                            <i class="fa-solid fa-bell mr-2"></i>
                            AI 추천 기상 시간
                        </h2>
                    
                        <div class="flex items-center space-x-2 bg-white/20 px-3 py-1 rounded-full">
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                            <span id="selected-route-label-ai"
                                  class="text-xs font-medium">
                                경로 선택 필요
                            </span>
                        </div>
                    </div>               
                    <div class="text-center py-6">
                        <div id="ai-push-time"
                             class="text-6xl font-bold mb-2">
                            --:--
                        </div>
                        <div id="ai-period" class="text-blue-200 text-sm">--</div>
                    </div>               
                    <div class="grid grid-cols-3 gap-3 mt-6">                   
                        <div class="bg-white/10 rounded-xl p-3 text-center backdrop-blur">
                            <div id="ai-prepare-time" class="text-2xl font-bold">--</div>
                            <div class="text-xs text-blue-200 mt-1">준비시간</div>
                        </div>
                    
                        <div class="bg-white/10 rounded-xl p-3 text-center backdrop-blur">
                            <div id="ai-move-time" class="text-2xl font-bold">--</div>
                            <div class="text-xs text-blue-200 mt-1">이동시간</div>
                        </div>                  
                        <div class="bg-white/10 rounded-xl p-3 text-center backdrop-blur">
                            <div id="ai-buffer-time" class="text-2xl font-bold">--</div>
                            <div class="text-xs text-blue-200 mt-1">여유시간</div>
                        </div>      
                    </div>
                </section>

                <!-- 5번째 줄 -->
                <section id="alarm-save-section" class="section-card lg:col-span-2">
                    <h2 class="heading-3 flex-center">
                        <i class="fa-solid fa-floppy-disk text-blue-600 mr-2"></i>
                        출발시간 Push 저장<span class="text-red-500 ml-0.5">*</span>
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-sm font-medium text-gray-700 mb-2 block">Push 이름</label>
                            <input id="push-name" type="text" placeholder="예: 출근하러 갑니다." maxlength="20" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-medium">
                        </div>
                        <div>
                            <label class="text-sm font-medium text-gray-700 mb-2 block">출발시간 Push 설정 시간</label>
                            <input type="time" id="alarm-time" class="w-32 px-2 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 font-semibold text-sm text-center">
                        </div>
                        <div>
                            <label class="text-sm font-medium text-gray-700 mb-2 block">반복 요일</label>
                            <div class="grid grid-cols-7 gap-1.5" id="weekday-container">
                                <button type="button" data-day="7" class="weekday-btn">일</button>
                                <button type="button" data-day="1" class="weekday-btn">월</button>
                                <button type="button" data-day="2" class="weekday-btn">화</button>
                                <button type="button" data-day="3" class="weekday-btn">수</button>
                                <button type="button" data-day="4" class="weekday-btn">목</button>
                                <button type="button" data-day="5" class="weekday-btn">금</button>
                                <button type="button" data-day="6" class="weekday-btn">토</button>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3 mt-4">
                                <button class="flex items-center justify-center py-3 px-2 bg-gray-50 border border-gray-200 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition">
                                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-5 w-5 mr-3">
                                    <span>Google 연동</span>
                                </button>
                                <button class="flex items-center justify-center py-3 px-2 bg-[#FEE500] text-[#191919] rounded-lg text-sm font-semibold hover:bg-[#FADA0A] transition">
                                    <i class="fa-solid fa-comment mr-2"></i>
                                    <span>카카오 연동</span>
                                </button>
                            </div>
                        </div>
                        <button id="push-save-btn" onclick="savePush()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-semibold text-lg hover:from-blue-700 hover:to-indigo-700 transition shadow-lg shadow-blue-500/30">
                            <i class="fa-solid fa-check mr-2"></i>
                            Push 저장하기
                        </button>
                    </div>
                </section>
        </div>
    </main>
</div>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=69ff9b2372e20bf03c14f8779791c93c&libraries=services"></script>
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script src="/js/calculator.js"></script>
</body>
</html>
