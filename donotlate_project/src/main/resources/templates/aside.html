<th:block th:fragment="asideFragment">
    <aside id="sidebar" class="app-sidebar">
        <div class="h-full overflow-y-auto custom-scrollbar">
            <div class="sidebar-content">
                <div class="sidebar-menu-list">
                    <a th:href="@{/main}" class="sidebar-link" th:classappend="${activeMenu == 'main'} ? ' active'">
                        <i class="fa-solid fa-house sidebar-icon"></i>
                        <span class="sidebar-text">메인 페이지</span>
                    </a>
            
                    <a th:href="@{/calculator}" class="sidebar-link" th:classappend="${activeMenu == 'calculator'} ? ' active'">
                        <i class="fa-solid fa-calculator sidebar-icon"></i>
                        <span class="font-medium">시간 계산 & Push 등록</span>
                    </a>
            
                    <a th:href="@{/chart}" class="sidebar-link" th:classappend="${activeMenu == 'chart'} ? ' active'">
                        <i class="fa-solid fa-chart-line sidebar-icon"></i>
                        <span class="sidebar-text">통계 대시보드</span>
                    </a>
            
                    <a th:href="@{/weather}" class="sidebar-link" th:classappend="${activeMenu == 'weather'} ? ' active'">
                        <i class="fa-solid fa-cloud-sun sidebar-icon"></i>
                        <span class="sidebar-text">현재 날씨</span>
                    </a>
            
                    <a th:href="@{/notice}" class="sidebar-link" th:classappend="${activeMenu == 'notice'} ? ' active'">
                        <i class="fa-solid fa-bullhorn sidebar-icon"></i>
                        <span class="sidebar-text">공지 사항</span>
                    </a>
                </div>
            </div>

            <!-- mypage URL에서만 노출 -->
            <th:block th:if="${isMyPage}">
                <div class="px-6 pb-6">
                    <div class="mypage-section-divider">
                        <h2 class="text-lg font-bold text-gray-800 mb-4 px-2">마이페이지</h2>
                        <nav class="space-y-1">
                            <a href="#profile-photo" class="sidebar-link">
                                <i class="fa-solid fa-camera mr-3 w-5"></i>
                                <span class="font-medium">프로필 사진 변경</span>
                            </a>
                            <a href="#name-change" class="sidebar-link">
                                <i class="fa-solid fa-user-pen mr-3 w-5"></i>
                                <span class="font-medium">이름 변경</span>
                            </a>
                            <a href="#password-change" class="sidebar-link" th:if="${session.loginMember != null and session.loginMember.socialType == null}">
                                <i class="fa-solid fa-lock mr-3 w-5"></i>
                                <span class="font-medium">비밀번호 변경</span>
                            </a>
                            <a href="#account-delete" class="sidebar-link">
                                <i class="fa-solid fa-user-xmark mr-3 w-5"></i>
                                <span class="font-medium">회원 탈퇴</span>
                            </a>
                        </nav>
                    </div>
                </div>
            </th:block>
        </div>
    </aside>
</th:block>
