<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>늦지마 이메일 인증</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #f0f7ff;">
    <table width="100%" border="0" cellpadding="0" cellspacing="0" style="background-color: #ddecff; padding: 50px 0;">
        <tr>
            <td align="center"> <table width="500" border="0" cellpadding="0" cellspacing="0" 
                       style="background-color: #ffffff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 40px; margin: 0 auto; text-align: center;">
                    
                    <tr>
                        <td align="center" style="padding-bottom: 20px;">
                            <table border="0" cellpadding="0" cellspacing="0" style="margin: 0 auto 12px auto;">
                                <tr>
                                    <td>
                                        <img src="cid:logo" alt="로고" width="80" height="80" style="display: block;">
                                    </td>
                                </tr>
                            </table>
                            <div style="font-size: 24px; font-weight: bold; color: #444444; letter-spacing: -0.5px;">늦지마</div>
                            <div style="font-size: 13px; color: #888888; margin-top: 5px;">스마트한 시간계산을 시작하세요</div>
                        </td>
                    </tr>
                    
                    <tr>
                        <td align="center" style="padding: 20px 0;">
                            <div style="height: 1px; background-color: #f0f0f0; width: 100%;"></div>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 20px 0;">
                            <h2 style="font-size: 20px; color: #333333; margin: 0;">인증번호</h2>
                            <p style="font-size: 15px; color: #666666; line-height: 1.6; margin-top: 15px;">
                                늦지마 서비스 이용을 위해<br>
                                아래의 인증번호를 입력해 주세요.
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 20px 0;">
                            <table border="0" cellpadding="0" cellspacing="0" width="80%" style="margin: 0 auto;">
                                <tr>
                                    <td style="background-color: #f9f9f9; border: 1px solid #eeeeee; padding: 25px; border-radius: 12px; text-align: center;">
                                        <span th:text="${authKey}" style="font-size: 32px; font-weight: bold; color: #3e5afb; letter-spacing: 5px;">123456</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="font-size: 13px; color: #999999; padding-top: 20px;">
                            <p style="margin: 0;">이 인증번호는 <strong>5분간</strong> 유효합니다.</p>
                            <p style="margin: 5px 0 0 0;">본인이 요청하지 않았다면 이 이메일을 무시하셔도 됩니다.</p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-top: 40px;">
                            <p style="font-size: 12px; color: #cccccc; margin: 0;">
                                &copy; 늦지마. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
                
            </td>
        </tr>
    </table>
</body>
</html>
