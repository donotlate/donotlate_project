<!DOCTYPE html>
<html>
<th:block th:replace="~{head :: headFragment}"></th:block>
<body class="bg-gray-50">

<th:block th:replace="~{header :: headerFragment}"></th:block>

<!-- 사이드바 오버레이 (모바일) -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<div class="layout-container">
    <th:block th:replace="~{aside :: asideFragment}"></th:block>
    <main class="main-content">
        <div class="w-full max-w-6xl px-4 sm:px-6 lg:px-8 py-6 sm:py-8 transition-all duration-300 ease-in-out">
            <div id="stats-overview" class="mb-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
                    <div class="card p-4 sm:p-6">
                        <div class="flex-between">
                            <div>
                                <p class="text-muted font-medium">총 사용자</p>
                                <h3 class="text-2xl sm:text-3xl font-bold text-gray-800 mt-2" id="userCount"></h3>
                            </div>
                            <div class="w-12 h-12 sm:w-14 sm:h-14 bg-blue-100 rounded-full flex-center justify-center">
                                <i class="fa-solid fa-users text-blue-600 text-xl sm:text-2xl"></i>
                            </div>
                        </div>
                    </div>

                    <div class="card p-4 sm:p-6">
                        <div class="flex-between">
                            <div>
                                <p class="text-muted font-medium">평균 Push 시간</p>
                                <h3 class="text-2xl sm:text-3xl font-bold text-gray-800 mt-2" id="avgPushTime"></h3>
                            </div>
                            <div class="w-12 h-12 sm:w-14 sm:h-14 bg-purple-100 rounded-full flex-center justify-center">
                                <i class="fa-solid fa-clock text-purple-600 text-xl sm:text-2xl"></i>
                            </div>
                        </div>
                    </div>

                    <div class="card p-4 sm:p-6">
                        <div class="flex-between">
                            <div>
                                <p class="text-muted font-medium">평균 준비 시간</p>
                                <h3 class="text-2xl sm:text-3xl font-bold text-gray-800 mt-2" id="avgPrepareTime"></h3>
                            </div>
                            <div class="w-12 h-12 sm:w-14 sm:h-14 bg-red-100 rounded-full flex-center justify-center">
                                <i class="fa-solid fa-clock-rotate-left text-red-600 text-xl sm:text-2xl"></i>
                            </div>
                        </div>
                    </div>

                    <div class="card p-4 sm:p-6">
                        <div class="flex-between">
                            <div>
                                <p class="text-muted font-medium">평균 교통 여유 시간</p>
                                <h3 class="text-2xl sm:text-3xl font-bold text-gray-800 mt-2" id="avgTrafficTime"></h3>
                            </div>
                            <div class="w-12 h-12 sm:w-14 sm:h-14 bg-green-100 rounded-full flex-center justify-center">
                                <i class="fa-solid fa-clock-rotate-left text-green-600 text-xl sm:text-2xl"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="traffic-section" class="mb-6">
                <h2 class="heading-2">대중교통 이용 추이</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="card p-4 sm:p-6">
                        <div class="flex-between mb-4">
                            <h3 class="heading-3" id="metro-title">요일별 지하철 이용자 수</h3>
                        </div>
                        <div id="metro-chart" style="height: 300px"></div>
                    </div>

                    <div class="card p-4 sm:p-6">
                        <div class="flex-between mb-4">
                            <h3 class="heading-3" id="bus-title">요일별 버스 이용자 수</h3>
                        </div>
                        <div id="bus-chart" style="height: 300px"></div>
                    </div>
                </div>
            </div>

            <div id="route-section" class="mb-6">
                <h2 class="heading-2">노선 및 환승 분석</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="card p-4 sm:p-6">
                        <div class="flex-between mb-4">
                            <h3 class="heading-3">환승 많은 역 Top 10</h3>
                        </div>
                        <div id="transfer-routes-chart" style="height: 350px"></div>
                    </div>

                    <div class="card p-4 sm:p-6">
                        <div class="flex-between mb-4">
                            <h3 class="heading-3">역 간 거리 긴 구간 Top 10</h3>
                        </div>
                        <div id="distance-chart" style="height: 350px"></div>
                    </div>
                </div>
            </div>

            <div id="station-section" class="mb-6">
                <h2 class="heading-2">출퇴근 이용자 통계</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="card p-4 sm:p-6">
                        <div class="flex-between mb-4">
                            <h3 class="heading-3">출근 이용자 많은 역</h3>
                        </div>
                        <div id="attendance-chart" style="height: 320px"></div>
                    </div>

                    <div class="card p-4 sm:p-6">
                        <div class="flex-between mb-4">
                            <h3 class="heading-3">퇴근 이용자 많은 역</h3>
                        </div>
                        <div id="leave-work-chart" style="height: 320px"></div>
                    </div>
                </div>
            </div>

            <div id="detailed-stats" class="mb-6">
                <h2 class="heading-2">상세 통계</h2>
                <div class="card p-4 sm:p-6">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                        <h3 class="heading-3">최근 1주일간 시간대별 출근 패턴</h3>
                    </div>
                    <div id="hourly-pattern-chart" style="height: 320px; max-height: 400px"></div>
                </div>
            </div>

        </div>
    </main>
</div>
<style>
    /* 스피너 본체 */
    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(0, 0, 0, 0.1);
        border-left-color: #3B82F6; /* 포인트 컬러 (파란색) */
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    /* 빙글빙글 도는 효과 */
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* 로딩 컨테이너 스타일 */
    .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        min-height: 200px; /* 차트 높이에 맞게 조절 */
    }

    .loading-text {
        margin-top: 15px;
        color: #6B7280;
        font-size: 0.9rem;
        font-weight: 500;
    }
</style>
<script src="js/chart.js"></script>
</body>
</html>
