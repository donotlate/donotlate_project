<!DOCTYPE html>
<html>
<th:block th:replace="~{head :: headFragment}"></th:block>
<body class="page-background">
<th:block th:replace="~{header :: headerFragment}"></th:block>
<div class="layout-container">
    <th:block th:replace="~{aside :: asideFragment}"></th:block>
    <main class="main-content">
        <div class="main-content-wrapper content-max-width-lg">
            <div class="content-header">
                <h1 class="heading-1">공지 사항</h1>
                <p class="text-secondary">서비스 업데이트 및 중요한 소식을 확인하세요</p>
            </div>

            <div class="card-large content-spacing-md">
                <div class="card-header-border flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:gap-4 w-full">
                        
                    <form th:action="@{/notice}" method="get"
                        class="flex flex-col gap-3 sm:flex-row sm:items-center sm:gap-4 w-full">

                    <!-- 검색 -->
                    <div class="search-input-wrapper relative w-full sm:w-auto">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none z-10"></i>
                        <input type="text"
                            name="query"
                            id="announcement-search"
                            th:value="${query}"
                            placeholder="공지사항 제목 검색..."
                            class="search-input w-full sm:w-64"
                            maxlength="50"/>
                    </div>

                    <!--  작성자 양충모  02-24 수정 -->
                    <!-- 카테고리 -->
                    <select name="categoryNo" class="search-input w-full sm:w-44"
                        onchange="this.form.submit()">
                        <option value="" th:selected="${categoryNo == null || categoryNo == ''}">전체</option>
                        <option value="1" th:selected="${categoryNo == 1}">일반</option>
                        <option value="2" th:selected="${categoryNo == 2}">업데이트</option>
                        <option value="3" th:selected="${categoryNo == 3}">점검</option>
                        <option value="4" th:selected="${categoryNo == 4}">이벤트</option>
                        <option value="5" th:selected="${categoryNo == 5}">긴급</option>
                    </select>

                    </form>
                        
                        
                    </div>
                </div>

                
                <div id="announcements-list">
                    <a th:each="notice : ${noticeList}"
                    th:href="@{/notice/{no}(no=${notice.boardNo})}"
                    class="block announcement-item-border announcement-item-hover"> <div class="announcement-item-content"> <div class="announcement-item-header">
                                <div class="announcement-item-main">
                                    <h3 class="announcement-title" th:text="${notice.boardTitle}">제목</h3>
                                    
                                    <p class="announcement-description" th:text="${notice.boardContent}">내용</p>
                                    
                                    <!--  작성자 양충모  02-24 수정 -->
                                    <div class="announcement-meta">
                                        <span class="category-badge"
                                            th:classappend="${notice.categoryNo == 1 ? 'badge-general' :
                                                            notice.categoryNo == 2 ? 'badge-update' :
                                                            notice.categoryNo == 3 ? 'badge-maintenance' :
                                                            notice.categoryNo == 4 ? 'badge-event' :
                                                            'badge-urgent'}"
                                            th:text="${notice.categoryName}">카테고리
                                        </span>

                                        <span>
                                            <i class="fa-regular fa-user meta-icon"></i>
                                            작성자: <span th:text="${notice.memberName}">관리자</span>
                                        </span>

                                        <span>
                                            <i class="fa-regular fa-eye meta-icon"></i>
                                            <span th:text="${notice.boardViewCount}">0</span>
                                        </span>

                                        <span>
                                            <i class="fa-regular fa-calendar meta-icon"></i>
                                            <span th:text="${#strings.substring(notice.boardWriteDate, 0, 10)}"></span>
                                        </span>

                                    </div>
                                </div>
                                
                                <div class="announcement-arrow">
                                    <i class="fa-solid fa-chevron-right"></i>
                                </div>
                            </div>
                        </div>
                    </a>
                    
                    <!-- 페이지네이션 -->
                    <div class="pagination">
                        <span th:text="|총 ${noticeList.size()}개 표시|"></span>

                        <div class="page-btns">
                            <button class="pagination-button" 
                                    th:disabled="${currentPage == 1}"
                                    th:onclick="|location.href='/notice?cp=${currentPage - 1}'|">
                                <i class="fa-solid fa-chevron-left"></i>
                            </button>

                            <th:block th:each="i : ${#numbers.sequence(1, totalPages > 0 ? totalPages : 1)}">
                                <button th:text="${i}"
                                        class="pagination-button"
                                        th:classappend="${currentPage == i} ? 'active' : ''"
                                        th:onclick="|location.href='/notice?cp=${i}'|">
                                </button>
                            </th:block>

                            <button class="pagination-button" 
                                    th:disabled="${currentPage == totalPages}"
                                    th:onclick="|location.href='/notice?cp=${currentPage + 1}'|">
                                <i class="fa-solid fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </main>
</div>
</body>
</html>
